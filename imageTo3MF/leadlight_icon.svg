<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102452"/>
      <stop offset="100%" stop-color="#071634"/>
    </linearGradient>
    <radialGradient id="glassA" cx="30%" cy="25%" r="90%">
      <stop offset="0%" stop-color="#8af8ff"/>
      <stop offset="100%" stop-color="#1dd5ff"/>
    </radialGradient>
    <radialGradient id="glassB" cx="50%" cy="20%" r="95%">
      <stop offset="0%" stop-color="#ffe39a"/>
      <stop offset="55%" stop-color="#d884ff"/>
      <stop offset="100%" stop-color="#7b56ff"/>
    </radialGradient>
    <radialGradient id="glassC" cx="55%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#7ff2ff"/>
      <stop offset="100%" stop-color="#3d61ff"/>
    </radialGradient>
    <radialGradient id="glassD" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#ff92ff"/>
      <stop offset="100%" stop-color="#9e47ff"/>
    </radialGradient>
    <radialGradient id="glassE" cx="70%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#7ff6ff"/>
      <stop offset="100%" stop-color="#2ed2ff"/>
    </radialGradient>
    <radialGradient id="glassF" cx="55%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#ffd98a"/>
      <stop offset="100%" stop-color="#f3b431"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020916" flood-opacity="0.42"/>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#54ecff" flood-opacity="0.85"/>
    </filter>
    <filter id="glowMagenta" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#e47bff" flood-opacity="0.8"/>
    </filter>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffd87b" flood-opacity="0.78"/>
    </filter>
    <style>
      .came { stroke: #081631; stroke-width: 18; stroke-linejoin: round; stroke-linecap: round; }
      .shine { fill: none; stroke: rgba(255,255,255,0.34); stroke-width: 6; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="92" y="92" width="840" height="840" rx="140" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="106" y="106" width="812" height="812" rx="126" fill="none" stroke="#17376d" stroke-width="10" opacity="0.7"/>

  <g transform="translate(214 210)">
    <polygon class="came" points="72,30 166,124 72,216 72,124" fill="url(#glassA)" filter="url(#glowCyan)"/>
    <polygon class="came" points="184,12 286,114 286,316 184,214" fill="url(#glassB)" filter="url(#glowGold)"/>
    <polygon class="came" points="72,236 166,330 72,422 72,330" fill="url(#glassD)" filter="url(#glowMagenta)"/>
    <polygon class="came" points="304,228 472,228 552,308 384,308" fill="url(#glassE)" filter="url(#glowCyan)"/>
    <polygon class="came" points="384,326 552,326 472,404 304,404" fill="url(#glassF)" filter="url(#glowGold)"/>
    <polygon class="came" points="184,346 286,448 80,448" fill="url(#glassD)" filter="url(#glowMagenta)"/>
    <polygon class="came" points="304,346 406,448 202,448" fill="url(#glassB)" filter="url(#glowMagenta)"/>

    <path class="shine" d="M95 56 L147 108"/>
    <path class="shine" d="M205 34 L258 88"/>
    <path class="shine" d="M96 260 L144 310"/>
    <path class="shine" d="M332 246 L446 246"/>
